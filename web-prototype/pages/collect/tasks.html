<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据采集 · 采集任务</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <style>
      .toast-wrap {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 60;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        min-width: 280px;
        max-width: 420px;
      }
    </style>
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center">
          <button
            type="button"
            class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]"
            title="折叠侧边栏"
            data-sidebar-toggle
          >
            <i class="fa-solid fa-bars text-muted"></i>
          </button>
        </header>

        <div class="p-4 space-y-4">
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="text-[16px] font-semibold">搜索查询</div>
              </div>
              <div class="flex gap-2">
                <button id="btnSearch" type="button" class="h-9 px-5 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>
                  搜索
                </button>
                <button id="btnReset" type="button" class="h-9 px-5 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold">
                  重置
                </button>
              </div>
            </div>
            <div class="mt-3 grid grid-cols-12 gap-3 items-end">
              <div class="col-span-12 sm:col-span-6 lg:col-span-4">
                <div class="text-[12px] text-muted mb-1">采集器名称</div>
                <input id="qCollectorName" class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" placeholder="请输入采集器名称" />
              </div>
              <div class="col-span-12 sm:col-span-6 lg:col-span-4">
                <div class="text-[12px] text-muted mb-1">任务状态</div>
                <select id="qStatus" class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
                  <option value="">全部</option>
                  <option value="成功">成功</option>
                  <option value="失败">失败</option>
                  <option value="取消">取消</option>
                </select>
              </div>
              <div class="col-span-12 sm:col-span-6 lg:col-span-4">
                <div class="text-[12px] text-muted mb-1">更新时间</div>
                <div class="grid grid-cols-2 gap-2">
                  <input id="qUpdatedStart" type="datetime-local" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-2 text-[13px]" />
                  <input id="qUpdatedEnd" type="datetime-local" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-2 text-[13px]" />
                </div>
              </div>
            </div>
          </section>

          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">采集任务列表</div>
            <div class="mt-3 overflow-x-auto rounded-xl border border-[rgba(201,205,212,.6)]">
              <table class="w-full table min-w-[2000px]">
                <thead class="bg-[rgba(245,247,250,.9)]">
                  <tr>
                    <th class="text-left px-3 py-2 whitespace-nowrap">采集器ID</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">采集器名称</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">触发方式</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">任务状态</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">开始时间</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">结束时间</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">原始数据条数</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">成功条数</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">失败条数</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">失败原因</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">创建人</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">创建时间</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">更新人</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">更新时间</th>
                  </tr>
                </thead>
                <tbody id="tbody" class="bg-surface"></tbody>
              </table>
            </div>
            <div class="mt-3 text-[13px] text-muted">
              共 <span id="totalCount" class="text-text font-semibold">0</span> 条
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="toast-wrap" id="toasts"></div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
    <script>
      (function () {
        /** @type {{collectorId:string,collectorName:string,trigger:string,status:string,startAt:string,endAt:string,rawCount:number,successCount:number,failCount:number,failReason:string,createdBy:string,createdAt:string,updatedBy:string,updatedAt:string}[]} */
        const tasks = [
          {
            collectorId: "COL-001",
            collectorName: "公开工商数据采集（华东-半导体）",
            trigger: "手动",
            status: "成功",
            startAt: "2026-04-29 09:00",
            endAt: "2026-04-29 09:18",
            rawCount: 128,
            successCount: 120,
            failCount: 8,
            failReason: "部分页面超时",
            createdBy: "李雷",
            createdAt: "2026-04-29 08:58",
            updatedBy: "李雷",
            updatedAt: "2026-04-29 09:18",
          },
          {
            collectorId: "COL-002",
            collectorName: "招标采购监控（“贴片机采购”）",
            trigger: "定时",
            status: "失败",
            startAt: "2026-04-28 14:00",
            endAt: "2026-04-28 14:05",
            rawCount: 0,
            successCount: 0,
            failCount: 0,
            failReason: "目标站点返回 403",
            createdBy: "张敏",
            createdAt: "2026-04-28 13:55",
            updatedBy: "系统",
            updatedAt: "2026-04-28 14:05",
          },
          {
            collectorId: "COL-003",
            collectorName: "垂直平台抽取（SMT China 需求帖）",
            trigger: "手动",
            status: "取消",
            startAt: "2026-04-27 11:20",
            endAt: "2026-04-27 11:22",
            rawCount: 15,
            successCount: 10,
            failCount: 5,
            failReason: "用户手动取消",
            createdBy: "王芳",
            createdAt: "2026-04-27 11:18",
            updatedBy: "王芳",
            updatedAt: "2026-04-27 11:22",
          },
          {
            collectorId: "COL-001",
            collectorName: "公开工商数据采集（华东-半导体）",
            trigger: "定时",
            status: "成功",
            startAt: "2026-04-26 06:00",
            endAt: "2026-04-26 06:25",
            rawCount: 256,
            successCount: 250,
            failCount: 6,
            failReason: "—",
            createdBy: "系统",
            createdAt: "2026-04-26 05:58",
            updatedBy: "系统",
            updatedAt: "2026-04-26 06:25",
          },
        ];

        function esc(s) {
          return String(s ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function toast(type, title, desc) {
          const wrap = document.getElementById("toasts");
          const el = document.createElement("div");
          el.className = "toast bg-surface rounded-xl border shadow-card";
          const color =
            type === "success" ? "rgba(0,180,42,.12)" : type === "error" ? "rgba(245,63,63,.10)" : "rgba(255,125,0,.10)";
          const border =
            type === "success" ? "rgba(0,180,42,.25)" : type === "error" ? "rgba(245,63,63,.25)" : "rgba(255,125,0,.25)";
          el.style.borderColor = border;
          el.innerHTML = `
            <div class="p-3 flex gap-3" style="background:${color}">
              <i class="fa-solid ${type === "success" ? "fa-circle-check" : type === "error" ? "fa-circle-xmark" : "fa-triangle-exclamation"} text-muted mt-0.5"></i>
              <div class="min-w-0">
                <div class="text-[14px] font-semibold">${esc(title)}</div>
                ${desc ? `<div class="text-[12px] text-muted mt-0.5">${esc(desc)}</div>` : ""}
              </div>
            </div>
          `;
          wrap.appendChild(el);
          setTimeout(() => el.remove(), 2400);
        }

        function parseDt(s) {
          return new Date(String(s).replace(" ", "T"));
        }

        function statusChip(st) {
          if (st === "成功") return `<span class="chip chip--success"><i class="fa-solid fa-circle-check"></i>成功</span>`;
          if (st === "取消") return `<span class="chip chip--warning"><i class="fa-solid fa-ban"></i>取消</span>`;
          return `<span class="chip chip--danger"><i class="fa-solid fa-circle-xmark"></i>失败</span>`;
        }

        function passes(row) {
          const qName = (document.getElementById("qCollectorName").value || "").trim();
          const qSt = document.getElementById("qStatus").value || "";
          const qS = document.getElementById("qUpdatedStart").value || "";
          const qE = document.getElementById("qUpdatedEnd").value || "";
          if (qName && !row.collectorName.includes(qName)) return false;
          if (qSt && row.status !== qSt) return false;
          const t = parseDt(row.updatedAt);
          if (qS && t && String(t) !== "Invalid Date" && t < new Date(qS)) return false;
          if (qE && t && String(t) !== "Invalid Date" && t > new Date(qE)) return false;
          return true;
        }

        function render() {
          const list = tasks.filter(passes);
          document.getElementById("totalCount").textContent = String(list.length);
          document.getElementById("tbody").innerHTML = list
            .map(
              (r) => `
              <tr class="border-t border-[rgba(201,205,212,.6)]">
                <td class="px-3 py-3 font-semibold whitespace-nowrap">${esc(r.collectorId)}</td>
                <td class="px-3 py-3 whitespace-nowrap max-w-[240px] truncate" title="${esc(r.collectorName)}">${esc(r.collectorName)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${esc(r.trigger)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${statusChip(r.status)}</td>
                <td class="px-3 py-3 whitespace-nowrap text-muted text-[13px]">${esc(r.startAt)}</td>
                <td class="px-3 py-3 whitespace-nowrap text-muted text-[13px]">${esc(r.endAt)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${esc(r.rawCount)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${esc(r.successCount)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${esc(r.failCount)}</td>
                <td class="px-3 py-3 text-muted text-[13px] max-w-[220px] truncate" title="${esc(r.failReason)}">${esc(r.failReason)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${esc(r.createdBy)}</td>
                <td class="px-3 py-3 whitespace-nowrap text-muted text-[13px]">${esc(r.createdAt)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${esc(r.updatedBy)}</td>
                <td class="px-3 py-3 whitespace-nowrap text-muted text-[13px]">${esc(r.updatedAt)}</td>
              </tr>
            `,
            )
            .join("");
        }

        document.getElementById("btnSearch").addEventListener("click", () => {
          render();
          toast("success", "已查询", "列表已按条件筛选");
        });
        document.getElementById("btnReset").addEventListener("click", () => {
          document.getElementById("qCollectorName").value = "";
          document.getElementById("qStatus").value = "";
          document.getElementById("qUpdatedStart").value = "";
          document.getElementById("qUpdatedEnd").value = "";
          render();
          toast("success", "已重置", "筛选条件已清空");
        });

        render();
      })();
    </script>
  </body>
</html>
