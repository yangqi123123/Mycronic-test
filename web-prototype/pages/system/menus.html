<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统管理 · 菜单管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center">
          <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]" title="折叠侧边栏" data-sidebar-toggle>
            <i class="fa-solid fa-bars text-muted"></i>
          </button>
        </header>

        <div class="p-4 space-y-4">
          <!-- 搜索区 -->
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="text-[16px] font-semibold">搜索查询</div>
              </div>
              <div class="flex gap-2">
                <button class="h-9 px-5 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>搜索</button>
                <button class="h-9 px-5 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold" data-simulate-loading>重置</button>
              </div>
            </div>
            <div class="mt-3 grid grid-cols-12 gap-3 items-end">
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">菜单名称</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px] bg-surface" placeholder="请输入菜单名称" />
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">状态</div>
                <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
                  <option value="">菜单状态</option>
                  <option>正常</option>
                  <option>停用</option>
                </select>
              </div>
            </div>
          </section>

          <!-- 列表区 -->
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="text-[16px] font-semibold">菜单列表</div>
              <div class="flex items-center gap-2 shrink-0">
                <button type="button" class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold" data-simulate-loading>展开/折叠</button>
                <button type="button" class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold" data-open-modal="menu-create">
                  <i class="fa-solid fa-plus mr-2"></i>新增菜单
                </button>
              </div>
            </div>

            <div class="mt-3 overflow-x-auto rounded-xl border border-[rgba(201,205,212,.6)]">
              <table class="w-full table min-w-[1200px]">
                <thead class="bg-[rgba(245,247,250,.9)]">
                  <tr>
                    <th class="text-left px-3 py-2 whitespace-nowrap">菜单名称</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">图标</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">排序</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">权限标识</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">组件路径</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">状态</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">创建时间</th>
                    <th class="text-right px-3 py-2 whitespace-nowrap">操作</th>
                  </tr>
                </thead>
                <tbody class="bg-surface">
                  <tr class="border-t border-[rgba(201,205,212,.6)]">
                    <td class="px-3 py-3 font-semibold whitespace-nowrap">工作台</td>
                    <td class="px-3 py-3"><i class="fa-regular fa-window-maximize text-muted"></i></td>
                    <td class="px-3 py-3">0</td>
                    <td class="px-3 py-3 text-muted text-[13px]">workbench</td>
                    <td class="px-3 py-3 text-muted text-[13px]">index</td>
                    <td class="px-3 py-3"><span class="chip chip--success">正常</span></td>
                    <td class="px-3 py-3 text-[13px] text-muted whitespace-nowrap">2024-06-07 16:34:40</td>
                    <td class="px-3 py-3 text-right space-x-3 whitespace-nowrap">
                      <button class="text-primary font-semibold" data-open-modal="menu-edit">修改</button>
                      <button class="text-primary font-semibold" data-open-modal="menu-create">新增</button>
                      <button class="text-[#F53F3F] font-semibold" data-open-modal="menu-del">删除</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="overlay" data-overlay="menu-create" data-open="false"></div>
    <div class="modal" data-modal="menu-create" data-open="false" style="max-width: 980px; width: min(980px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">添加菜单</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="menu-create"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">上级菜单</div>
          <div class="col-span-9">
            <select class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
              <option>主类目</option>
              <option>工作台</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">菜单类型</div>
          <div class="col-span-9 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mtype-create" class="accent-primary" checked /> 目录</label>
            <label class="flex items-center gap-2"><input type="radio" name="mtype-create" class="accent-primary" /> 菜单</label>
            <label class="flex items-center gap-2"><input type="radio" name="mtype-create" class="accent-primary" /> 按钮</label>
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">菜单图标</div>
          <div class="col-span-9 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-muted text-[13px]"></i>
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] pl-9 pr-3 text-[14px]" placeholder="点击选择图标" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted"><span class="text-[#F53F3F]">*</span> 菜单名称</div>
          <div class="col-span-4">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="请输入菜单名称" />
          </div>
          <div class="col-span-2 text-[14px] text-muted"><span class="text-[#F53F3F]">*</span> 显示排序</div>
          <div class="col-span-3">
            <input type="number" class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="0" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">权限标识</div>
          <div class="col-span-9">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="如：system:menu:list" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">组件路径</div>
          <div class="col-span-9">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="如：index" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">是否外链</div>
          <div class="col-span-3 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mlink-create" class="accent-primary" /> 是</label>
            <label class="flex items-center gap-2"><input type="radio" name="mlink-create" class="accent-primary" checked /> 否</label>
          </div>
          <div class="col-span-2 text-[14px] text-muted"><span class="text-[#F53F3F]">*</span> 路由地址</div>
          <div class="col-span-4">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="请输入路由地址" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">显示状态</div>
          <div class="col-span-3 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mshow-create" class="accent-primary" checked /> 显示</label>
            <label class="flex items-center gap-2"><input type="radio" name="mshow-create" class="accent-primary" /> 隐藏</label>
          </div>
          <div class="col-span-2 text-[14px] text-muted">菜单状态</div>
          <div class="col-span-4 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mstatus-create" class="accent-primary" checked /> 正常</label>
            <label class="flex items-center gap-2"><input type="radio" name="mstatus-create" class="accent-primary" /> 停用</label>
          </div>
        </div>
      </div>
    </div>

    <div class="overlay" data-overlay="menu-edit" data-open="false"></div>
    <div class="modal" data-modal="menu-edit" data-open="false" style="max-width: 980px; width: min(980px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">编辑菜单</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="menu-edit"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">上级菜单</div>
          <div class="col-span-9">
            <select class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
              <option>主类目</option>
              <option selected>工作台</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">菜单类型</div>
          <div class="col-span-9 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mtype-edit" class="accent-primary" checked /> 目录</label>
            <label class="flex items-center gap-2"><input type="radio" name="mtype-edit" class="accent-primary" /> 菜单</label>
            <label class="flex items-center gap-2"><input type="radio" name="mtype-edit" class="accent-primary" /> 按钮</label>
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">菜单图标</div>
          <div class="col-span-9 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-muted text-[13px]"></i>
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] pl-9 pr-3 text-[14px]" value="fa-window-maximize" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted"><span class="text-[#F53F3F]">*</span> 菜单名称</div>
          <div class="col-span-4">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="工作台" />
          </div>
          <div class="col-span-2 text-[14px] text-muted"><span class="text-[#F53F3F]">*</span> 显示排序</div>
          <div class="col-span-3">
            <input type="number" class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="0" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">权限标识</div>
          <div class="col-span-9">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="workbench" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">组件路径</div>
          <div class="col-span-9">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="index" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">是否外链</div>
          <div class="col-span-3 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mlink-edit" class="accent-primary" /> 是</label>
            <label class="flex items-center gap-2"><input type="radio" name="mlink-edit" class="accent-primary" checked /> 否</label>
          </div>
          <div class="col-span-2 text-[14px] text-muted"><span class="text-[#F53F3F]">*</span> 路由地址</div>
          <div class="col-span-4">
            <input class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="index" />
          </div>
        </div>

        <div class="grid grid-cols-12 gap-4 items-center">
          <div class="col-span-3 text-[14px] text-muted">显示状态</div>
          <div class="col-span-3 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mshow-edit" class="accent-primary" checked /> 显示</label>
            <label class="flex items-center gap-2"><input type="radio" name="mshow-edit" class="accent-primary" /> 隐藏</label>
          </div>
          <div class="col-span-2 text-[14px] text-muted">菜单状态</div>
          <div class="col-span-4 flex items-center gap-6 text-[14px]">
            <label class="flex items-center gap-2"><input type="radio" name="mstatus-edit" class="accent-primary" checked /> 正常</label>
            <label class="flex items-center gap-2"><input type="radio" name="mstatus-edit" class="accent-primary" /> 停用</label>
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2 border-t border-[rgba(201,205,212,.6)]">
          <button class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="menu-edit">取消</button>
          <button class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold" data-close="menu-edit" data-simulate-loading>保存</button>
        </div>
      </div>
    </div>

    <div class="overlay" data-overlay="menu-del" data-open="false"></div>
    <div class="modal" data-modal="menu-del" data-open="false">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">删除菜单</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="menu-del"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4">
        <p class="text-[14px] text-muted">存在子节点时不可删除；删除后角色权限需重新发布。</p>
        <div class="mt-4 flex justify-end gap-2">
          <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="menu-del">取消</button>
          <button class="h-9 px-3 rounded-lg bg-[#F53F3F] text-white text-[14px] font-semibold" data-close="menu-del" data-simulate-loading>确认</button>
        </div>
      </div>
    </div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
  </body>
</html>
