<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统管理 · 数据字典</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]" title="折叠侧边栏" data-sidebar-toggle>
              <i class="fa-solid fa-bars text-muted"></i>
            </button>
            <div>
              <div class="text-[18px] font-semibold text-text leading-tight">数据字典</div>
              <div class="text-[12px] text-muted mt-0.5">字典列表 + 字典值列表 · 用于系统下拉与枚举统一管理</div>
            </div>
          </div>
        </header>

        <div class="p-4 space-y-4">
          <!-- 图一：左右双栏 -->
          <section class="grid grid-cols-12 gap-4">
            <!-- 左：字典列表 -->
            <div class="col-span-7 bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
              <div class="text-[16px] font-semibold">字典列表</div>
              <div class="mt-3 grid grid-cols-12 gap-3 items-end">
                <div class="col-span-4">
                  <div class="text-[12px] text-muted mb-1">字典名称</div>
                  <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px] bg-surface" placeholder="请输入" />
                </div>
                <div class="col-span-4">
                  <div class="text-[12px] text-muted mb-1">字典标识</div>
                  <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px] bg-surface" placeholder="请输入" />
                </div>
                <div class="col-span-4 flex gap-2">
                  <button class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>搜索</button>
                  <button class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold" data-simulate-loading>重置</button>
                  <button class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold" data-open-modal="dict-add">新增</button>
                </div>
              </div>

              <div class="mt-3 overflow-hidden rounded-xl border border-[rgba(201,205,212,.6)]">
                <table class="w-full table">
                  <thead class="bg-[rgba(245,247,250,.9)]">
                    <tr>
                      <th class="text-left px-3 py-2">字典标识</th>
                      <th class="text-left px-3 py-2">字典名称</th>
                      <th class="text-right px-3 py-2">操作</th>
                    </tr>
                  </thead>
                  <tbody class="bg-surface">
                    <tr class="border-t border-[rgba(201,205,212,.6)]">
                      <td class="px-3 py-3 text-muted">INVOICE_TYPE</td>
                      <td class="px-3 py-3 font-semibold">发票类型</td>
                      <td class="px-3 py-3 text-right space-x-3 whitespace-nowrap">
                        <button class="text-primary font-semibold" data-simulate-loading>编辑</button>
                        <button class="text-[#F53F3F] font-semibold" data-simulate-loading>删除</button>
                      </td>
                    </tr>
                    <tr class="border-t border-[rgba(201,205,212,.6)]">
                      <td class="px-3 py-3 text-muted">THREAD_LEVEL</td>
                      <td class="px-3 py-3 font-semibold">线索优先级</td>
                      <td class="px-3 py-3 text-right space-x-3 whitespace-nowrap">
                        <button class="text-primary font-semibold" data-simulate-loading>编辑</button>
                        <button class="text-[#F53F3F] font-semibold" data-simulate-loading>删除</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="mt-3 flex items-center justify-between text-[13px] text-muted">
                <div>共 <span class="text-text font-semibold">16</span> 条</div>
                <div class="flex items-center gap-3">
                  <select class="h-8 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-2 text-[13px]">
                    <option>10条/页</option>
                    <option>20条/页</option>
                  </select>
                  <div class="flex items-center gap-1">
                    <button type="button" class="h-8 w-8 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface" disabled aria-label="上一页"><i class="fa-solid fa-angle-left"></i></button>
                    <button type="button" class="h-8 w-8 rounded-lg bg-primary text-white font-semibold">1</button>
                    <button type="button" class="h-8 w-8 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface" aria-label="下一页"><i class="fa-solid fa-angle-right"></i></button>
                  </div>
                  <div class="flex items-center gap-1">
                    <span>前往</span>
                    <input type="number" min="1" value="1" class="w-12 h-8 rounded-lg border border-[rgba(201,205,212,.7)] px-1 text-center text-[13px] bg-surface" />
                    <span>页</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- 右：字典值列表 -->
            <div class="col-span-5 bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
              <div class="flex items-center justify-between">
                <div class="text-[16px] font-semibold">字典值列表</div>
                <button class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold" data-open-modal="dictval-add">新增</button>
              </div>
              <div class="mt-3 overflow-hidden rounded-xl border border-[rgba(201,205,212,.6)]">
                <table class="w-full table">
                  <thead class="bg-[rgba(245,247,250,.9)]">
                    <tr>
                      <th class="text-left px-3 py-2">字典名称</th>
                      <th class="text-left px-3 py-2">字典键值</th>
                      <th class="text-right px-3 py-2">操作</th>
                    </tr>
                  </thead>
                  <tbody class="bg-surface">
                    <tr class="border-t border-[rgba(201,205,212,.6)]">
                      <td class="px-3 py-3 font-semibold">增值发票</td>
                      <td class="px-3 py-3 text-muted">2</td>
                      <td class="px-3 py-3 text-right space-x-3 whitespace-nowrap">
                        <button class="text-primary font-semibold" data-simulate-loading>编辑</button>
                        <button class="text-[#F53F3F] font-semibold" data-simulate-loading>删除</button>
                      </td>
                    </tr>
                    <tr class="border-t border-[rgba(201,205,212,.6)]">
                      <td class="px-3 py-3 font-semibold">普通发票</td>
                      <td class="px-3 py-3 text-muted">1</td>
                      <td class="px-3 py-3 text-right space-x-3 whitespace-nowrap">
                        <button class="text-primary font-semibold" data-simulate-loading>编辑</button>
                        <button class="text-[#F53F3F] font-semibold" data-simulate-loading>删除</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- 图二：新增字典 -->
    <div class="overlay" data-overlay="dict-add" data-open="false"></div>
    <div class="modal" data-modal="dict-add" data-open="false" style="max-width: 860px; width: min(860px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">新增字典</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="dict-add"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-6">
        <div class="grid grid-cols-2 gap-6">
          <div>
            <div class="text-[12px] text-muted mb-1">字典名称</div>
            <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="请输入" />
            <div class="text-[12px] text-muted mt-1">不允许输入符号</div>
          </div>
          <div>
            <div class="text-[12px] text-muted mb-1"><span class="text-[#F53F3F]">*</span> 字典标识</div>
            <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="请输入" />
            <div class="text-[12px] text-muted mt-1">必须唯一</div>
          </div>
        </div>
        <div class="flex justify-center pt-8">
          <button class="h-10 px-8 rounded-lg bg-primary text-white text-[14px] font-semibold" data-close="dict-add" data-simulate-loading>确认创建</button>
        </div>
      </div>
    </div>

    <!-- 图三：新增字典值 -->
    <div class="overlay" data-overlay="dictval-add" data-open="false"></div>
    <div class="modal" data-modal="dictval-add" data-open="false" style="max-width: 860px; width: min(860px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">新增字典值</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="dictval-add"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-6">
        <div class="grid grid-cols-2 gap-6">
          <div>
            <div class="text-[12px] text-muted mb-1">字典名称</div>
            <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px] bg-[rgba(245,247,250,.9)]" value="发票类型" readonly />
            <div class="text-[12px] text-muted mt-1">不允许输入符号</div>
          </div>
          <div>
            <div class="text-[12px] text-muted mb-1">字典标识</div>
            <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px] bg-[rgba(245,247,250,.9)]" value="INVOICE_TYPE" readonly />
            <div class="text-[12px] text-muted mt-1">必须唯一</div>
          </div>
          <div>
            <div class="text-[12px] text-muted mb-1">字典名称</div>
            <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="请输入" />
            <div class="text-[12px] text-muted mt-1">不允许输入符号</div>
          </div>
          <div>
            <div class="text-[12px] text-muted mb-1"><span class="text-[#F53F3F]">*</span> 字典键值</div>
            <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="请输入" />
            <div class="text-[12px] text-muted mt-1">必须是唯一的,编辑时不允许修改</div>
          </div>
        </div>
        <div class="flex justify-center pt-8">
          <button class="h-10 px-8 rounded-lg bg-primary text-white text-[14px] font-semibold" data-close="dictval-add" data-simulate-loading>确认创建</button>
        </div>
      </div>
    </div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
  </body>
</html>
