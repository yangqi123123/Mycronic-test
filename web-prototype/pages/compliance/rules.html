<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合规 · 规则配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]" title="折叠侧边栏" data-sidebar-toggle>
              <i class="fa-solid fa-bars text-muted"></i>
            </button>
            <div>
              <div class="text-[18px] font-semibold text-text leading-tight">规则配置</div>
              <div class="text-[12px] text-muted">触达频率阈值 · 退订拦截 · 话术库 · 采集合规校验（原型）</div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <a class="h-9 px-3 rounded-lg bg-surface border border-[rgba(201,205,212,.7)] hover:bg-[rgba(245,247,250,.9)] text-[14px] font-semibold flex items-center" href="./overview.html">
              <i class="fa-solid fa-arrow-left text-muted mr-2"></i>返回总览
            </a>
            <button class="h-9 px-3 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>
              <i class="fa-solid fa-circle-check mr-2"></i>保存（原型）
            </button>
          </div>
        </header>

        <div class="p-4 space-y-4">
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">触达频率阈值</div>
            <div class="text-[12px] text-muted mt-1">需符合《电信条例》与内部策略，违规自动暂停触达并告警</div>
            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-4">
                <div class="text-[12px] text-muted mb-1">外呼（次/天/客户）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="3" />
              </div>
              <div class="col-span-4">
                <div class="text-[12px] text-muted mb-1">短信（条/天）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="1" />
              </div>
              <div class="col-span-4">
                <div class="text-[12px] text-muted mb-1">邮件（封/周）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="1" />
              </div>
            </div>
          </section>

          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">退订规则</div>
            <div class="text-[12px] text-muted mt-1">退订请求需 10 分钟内处理；退订名单默认永久拦截（除非合规审核移除）</div>
            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-4">
                <div class="text-[12px] text-muted mb-1">处理时限（分钟）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="10" />
              </div>
              <div class="col-span-8">
                <div class="text-[12px] text-muted mb-1">移除条件（摘要）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="客户申诉恢复 + 管理员审核 + 记录审计日志" />
              </div>
            </div>
          </section>

          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">话术违规检测（原型）</div>
            <div class="text-[12px] text-muted mt-1">命中“虚假宣传话术库”将暂停发送并产生告警</div>
            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-8">
                <div class="text-[12px] text-muted mb-1">违规关键词（示例）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="百分百成功, 绝对领先, 保证通过" />
              </div>
              <div class="col-span-4">
                <div class="text-[12px] text-muted mb-1">策略</div>
                <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-[rgba(245,247,250,.9)] px-3 text-[14px]">
                  <option>拦截并告警</option>
                  <option>仅告警</option>
                </select>
              </div>
            </div>
          </section>

          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">采集合规校验（原型）</div>
            <div class="text-[12px] text-muted mt-1">涉密网址/关键词库每月更新；违规采集请求需存档</div>
            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-6">
                <div class="text-[12px] text-muted mb-1">涉密网址库（示例）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="intranet.*, 10.*.*, *.mil, *.gov-internal" />
              </div>
              <div class="col-span-6">
                <div class="text-[12px] text-muted mb-1">涉密关键词库（示例）</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="涉密, 军工内部, 绝密, 机密" />
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
  </body>
</html>
