<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统管理 · 操作日志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center">
          <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]" title="折叠侧边栏" data-sidebar-toggle>
            <i class="fa-solid fa-bars text-muted"></i>
          </button>
        </header>

        <div class="p-4 space-y-4">
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">搜索查询</div>
            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-2">
                <div class="text-[12px] text-muted mb-1">模块</div>
                <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-[rgba(245,247,250,.9)] px-3 text-[14px]">
                  <option>全部</option>
                  <option>系统管理</option>
                  <option>CRM</option>
                  <option>触达</option>
                </select>
              </div>
              <div class="col-span-2">
                <div class="text-[12px] text-muted mb-1">结果</div>
                <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-[rgba(245,247,250,.9)] px-3 text-[14px]">
                  <option>全部</option>
                  <option>成功</option>
                  <option>失败</option>
                </select>
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">操作人</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" />
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">关键词</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="对象ID / 路径" />
              </div>
              <div class="col-span-2 flex items-end gap-2">
                <button class="w-full h-9 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>搜索</button>
                <button class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold">重置</button>
              </div>
            </div>
          </section>

          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="text-[16px] font-semibold">日志列表</div>
              <button type="button" class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold shrink-0" data-simulate-loading>
                <i class="fa-solid fa-download mr-2"></i>导出
              </button>
            </div>
            <div class="mt-3 overflow-hidden rounded-xl border border-[rgba(201,205,212,.6)]">
              <table class="w-full table">
                <thead class="bg-[rgba(245,247,250,.9)]">
                  <tr>
                    <th class="text-left px-3 py-2">时间</th>
                    <th class="text-left px-3 py-2">模块</th>
                    <th class="text-left px-3 py-2">动作</th>
                    <th class="text-left px-3 py-2">操作人</th>
                    <th class="text-left px-3 py-2">IP</th>
                    <th class="text-left px-3 py-2">结果</th>
                    <th class="text-right px-3 py-2">详情</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="border-t border-[rgba(201,205,212,.6)]">
                    <td class="px-3 py-3 text-[13px]">2026-04-14 10:22:01</td>
                    <td class="px-3 py-3">系统管理</td>
                    <td class="px-3 py-3">角色权限变更</td>
                    <td class="px-3 py-3">管理员</td>
                    <td class="px-3 py-3 text-muted text-[13px]">10.8.0.12</td>
                    <td class="px-3 py-3"><span class="chip chip--success">成功</span></td>
                    <td class="px-3 py-3 text-right">
                      <button class="text-primary font-semibold" data-open-drawer="op-detail">查看</button>
                    </td>
                  </tr>
                  <tr class="border-t border-[rgba(201,205,212,.6)]">
                    <td class="px-3 py-3 text-[13px]">2026-04-14 09:10:33</td>
                    <td class="px-3 py-3">CRM</td>
                    <td class="px-3 py-3">客户合并</td>
                    <td class="px-3 py-3">张三</td>
                    <td class="px-3 py-3 text-muted text-[13px]">10.8.0.55</td>
                    <td class="px-3 py-3"><span class="chip chip--success">成功</span></td>
                    <td class="px-3 py-3 text-right">
                      <button class="text-primary font-semibold" data-open-drawer="op-detail">查看</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="overlay" data-overlay="op-detail" data-open="false"></div>
    <div class="drawer" data-drawer="op-detail" data-open="false">
      <div class="h-14 px-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">操作详情</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="op-detail"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4 space-y-3 text-[14px]" style="max-height: calc(100vh - 56px); overflow-y: auto">
        <div><span class="text-muted">请求 ID：</span>req-8f2a1c</div>
        <div><span class="text-muted">修改前：</span></div>
        <pre class="p-3 rounded-lg bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)] text-[12px] overflow-x-auto">{"role":"SALES","perms":["crm:read"]}</pre>
        <div><span class="text-muted">修改后：</span></div>
        <pre class="p-3 rounded-lg bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)] text-[12px] overflow-x-auto">{"role":"SALES","perms":["crm:read","crm:export"]}</pre>
        <div class="text-[12px] text-muted">敏感操作已记录二次验证流水（原型）。</div>
      </div>
    </div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
  </body>
</html>
