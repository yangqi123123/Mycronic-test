<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统管理 · 角色管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center">
          <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]" title="折叠侧边栏" data-sidebar-toggle>
            <i class="fa-solid fa-bars text-muted"></i>
          </button>
        </header>

        <div class="p-4 space-y-4">
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="text-[16px] font-semibold">搜索查询</div>
            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-4">
                <div class="text-[12px] text-muted mb-1">关键词</div>
                <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="角色名称 / 编码" />
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">状态</div>
                <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
                  <option>全部</option>
                  <option>启用</option>
                  <option>停用</option>
                </select>
              </div>
              <div class="col-span-3 flex items-end gap-2">
                <button class="w-full h-9 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>搜索</button>
                <button class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold">重置</button>
              </div>
            </div>
          </section>

          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-center justify-between gap-3">
              <div>
                <div class="text-[16px] font-semibold">角色列表</div>
                <div class="text-[12px] text-muted mt-1">内置角色不可删除；停用后关联用户不可登录对应能力</div>
              </div>
              <button type="button" class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold shrink-0" data-open-modal="role-create">
                <i class="fa-solid fa-plus mr-2"></i>新增角色
              </button>
            </div>
            <div class="mt-3 overflow-hidden rounded-xl border border-[rgba(201,205,212,.6)]">
              <table class="w-full table">
                <thead class="bg-[rgba(245,247,250,.9)]">
                  <tr>
                    <th class="text-left px-3 py-2">角色名称</th>
                    <th class="text-left px-3 py-2">编码</th>
                    <th class="text-left px-3 py-2">数据权限</th>
                    <th class="text-left px-3 py-2">创建人</th>
                    <th class="text-left px-3 py-2">创建时间</th>
                    <th class="text-left px-3 py-2">状态</th>
                    <th class="text-right px-3 py-2">操作</th>
                  </tr>
                </thead>
                <tbody class="bg-surface">
                  <tr class="border-t border-[rgba(201,205,212,.6)]">
                    <td class="px-3 py-3 font-semibold">系统管理员</td>
                    <td class="px-3 py-3 text-muted">ADMIN</td>
                    <td class="px-3 py-3">不限制范围</td>
                    <td class="px-3 py-3">系统</td>
                    <td class="px-3 py-3 text-[13px] text-muted">2026-04-01 09:00</td>
                    <td class="px-3 py-3"><span class="chip chip--success">启用</span></td>
                    <td class="px-3 py-3 text-right space-x-2 whitespace-nowrap">
                      <button class="text-primary font-semibold" data-open-drawer="perm">权限</button>
                      <button class="text-primary font-semibold" data-open-modal="role-edit">编辑</button>
                      <button class="text-muted font-semibold" disabled title="内置">删除</button>
                    </td>
                  </tr>
                  <tr class="border-t border-[rgba(201,205,212,.6)]">
                    <td class="px-3 py-3 font-semibold">销售主管</td>
                    <td class="px-3 py-3 text-muted">SALES_LEAD</td>
                    <td class="px-3 py-3">所属区域</td>
                    <td class="px-3 py-3">管理员</td>
                    <td class="px-3 py-3 text-[13px] text-muted">2026-04-10 14:23</td>
                    <td class="px-3 py-3"><span class="chip chip--success">启用</span></td>
                    <td class="px-3 py-3 text-right space-x-2 whitespace-nowrap">
                      <button class="text-primary font-semibold" data-open-drawer="perm">权限</button>
                      <button class="text-primary font-semibold" data-open-modal="role-edit">编辑</button>
                      <button class="text-[#F53F3F] font-semibold" data-open-modal="role-del">删除</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="overlay" data-overlay="role-create" data-open="false"></div>
    <div class="modal" data-modal="role-create" data-open="false">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">新增角色</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="role-create"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4 space-y-3">
        <div>
          <div class="text-[12px] text-muted mb-1">角色名称 <span class="text-[#F53F3F]">*</span></div>
          <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" />
        </div>
        <div>
          <div class="text-[12px] text-muted mb-1">角色编码 <span class="text-[#F53F3F]">*</span></div>
          <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="大写英文+下划线" />
        </div>
        <div>
          <div class="text-[12px] text-muted mb-1">状态</div>
          <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
            <option>启用</option>
            <option>禁用</option>
          </select>
        </div>
        <div>
          <div class="text-[12px] text-muted mb-2">数据权限</div>
          <div class="space-y-2">
            <label class="flex items-center gap-2 text-[14px]">
              <input type="radio" name="role-scope-create" class="accent-primary" checked />
              自己的（创建 + 负责）
            </label>
            <label class="flex items-center gap-2 text-[14px]">
              <input type="radio" name="role-scope-create" class="accent-primary" />
              所属区域
            </label>
            <label class="flex items-center gap-2 text-[14px]">
              <input type="radio" name="role-scope-create" class="accent-primary" />
              不限制范围
            </label>
          </div>
        </div>
        <div>
          <div class="text-[12px] text-muted mb-1">备注</div>
          <textarea class="w-full h-20 rounded-lg border border-[rgba(201,205,212,.7)] p-3 text-[14px]"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="role-create">取消</button>
          <button class="h-9 px-3 rounded-lg bg-primary text-white text-[14px] font-semibold" data-close="role-create" data-simulate-loading>保存</button>
        </div>
      </div>
    </div>

    <div class="overlay" data-overlay="role-edit" data-open="false"></div>
    <div class="modal" data-modal="role-edit" data-open="false">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">编辑角色</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="role-edit"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4 space-y-3">
        <div>
          <div class="text-[12px] text-muted mb-1">角色名称</div>
          <input class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" value="销售主管" />
        </div>
        <div>
          <div class="text-[12px] text-muted mb-1">状态</div>
          <select class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]">
            <option>启用</option>
            <option>停用</option>
          </select>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="role-edit">取消</button>
          <button class="h-9 px-3 rounded-lg bg-primary text-white text-[14px] font-semibold" data-close="role-edit" data-simulate-loading>保存</button>
        </div>
      </div>
    </div>

    <div class="overlay" data-overlay="role-del" data-open="false"></div>
    <div class="modal" data-modal="role-del" data-open="false">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">删除角色</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="role-del"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4">
        <p class="text-[14px] text-muted">确认删除该角色？若存在关联用户需先解绑。</p>
        <div class="mt-4 flex justify-end gap-2">
          <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="role-del">取消</button>
          <button class="h-9 px-3 rounded-lg bg-[#F53F3F] text-white text-[14px] font-semibold" data-close="role-del" data-simulate-loading>确认删除</button>
        </div>
      </div>
    </div>

    <div class="overlay" data-overlay="perm" data-open="false"></div>
    <div class="drawer" data-drawer="perm" data-open="false">
      <div class="h-14 px-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">权限配置</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="perm"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4 space-y-4 overflow-y-auto" style="max-height: calc(100vh - 56px)">
        <div class="flex gap-2">
          <button type="button" class="h-8 px-3 rounded-lg border text-[13px] font-semibold bg-primary text-white border-[rgba(255,138,0,.35)]" data-tab-group="perm-tabs" data-tab-target="menu" aria-selected="true">菜单功能</button>
          <button type="button" class="h-8 px-3 rounded-lg border text-[13px] font-semibold bg-surface border-[rgba(201,205,212,.7)]" data-tab-group="perm-tabs" data-tab-target="data">数据范围</button>
        </div>
        <div data-tab-panel="menu" data-tab-group="perm-tabs" class="rounded-xl border border-[rgba(201,205,212,.6)] p-3 space-y-3">
          <div class="flex items-center justify-between">
            <div class="text-[12px] text-muted">树形菜单勾选（目录/菜单/按钮）</div>
            <div class="flex gap-2">
              <button class="h-8 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[13px] font-semibold" data-simulate-loading>全选</button>
              <button class="h-8 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[13px] font-semibold" data-simulate-loading>清空</button>
            </div>
          </div>

          <div class="rounded-xl border border-[rgba(201,205,212,.6)] overflow-hidden">
            <div class="p-3 bg-[rgba(245,247,250,.9)] border-b border-[rgba(201,205,212,.6)]">
              <label class="flex items-center gap-2 text-[14px] font-semibold">
                <input type="checkbox" checked class="accent-primary" />
                客户与跟进
                <span class="chip ml-2">目录</span>
              </label>
            </div>
            <div class="p-3 space-y-2">
              <div>
                <label class="flex items-center gap-2 text-[14px] font-semibold">
                  <input type="checkbox" checked class="accent-primary" />
                  客户数据中心
                  <span class="chip ml-2">菜单</span>
                </label>
                <div class="mt-2 pl-6 space-y-1">
                  <label class="flex items-center gap-2 text-[14px]">
                    <input type="checkbox" checked class="accent-primary" />
                    查看
                    <span class="chip ml-2">按钮</span>
                  </label>
                  <label class="flex items-center gap-2 text-[14px]">
                    <input type="checkbox" checked class="accent-primary" />
                    编辑
                    <span class="chip ml-2">按钮</span>
                  </label>
                  <label class="flex items-center gap-2 text-[14px]">
                    <input type="checkbox" class="accent-primary" />
                    导出
                    <span class="chip ml-2">按钮</span>
                  </label>
                  <label class="flex items-center gap-2 text-[14px]">
                    <input type="checkbox" class="accent-primary" />
                    合并
                    <span class="chip ml-2">按钮</span>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="rounded-xl border border-[rgba(201,205,212,.6)] overflow-hidden">
            <div class="p-3 bg-[rgba(245,247,250,.9)] border-b border-[rgba(201,205,212,.6)]">
              <label class="flex items-center gap-2 text-[14px] font-semibold">
                <input type="checkbox" class="accent-primary" />
                智能触达
                <span class="chip ml-2">目录</span>
              </label>
            </div>
            <div class="p-3 space-y-2">
              <label class="flex items-center gap-2 text-[14px] font-semibold">
                <input type="checkbox" class="accent-primary" />
                触达概览
                <span class="chip ml-2">菜单</span>
              </label>
              <div class="pl-6 space-y-1">
                <label class="flex items-center gap-2 text-[14px]">
                  <input type="checkbox" class="accent-primary" />
                  发送
                  <span class="chip ml-2">按钮</span>
                </label>
                <label class="flex items-center gap-2 text-[14px]">
                  <input type="checkbox" class="accent-primary" />
                  模板管理
                  <span class="chip ml-2">按钮</span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div data-tab-panel="data" data-tab-group="perm-tabs" class="hidden rounded-xl border border-[rgba(201,205,212,.6)] p-3">
          <div class="text-[12px] text-muted mb-3">数据范围（单选）</div>
          <div class="space-y-2">
            <label class="flex items-center gap-2 text-[14px]">
              <input type="radio" name="role-scope" class="accent-primary" checked />
              自己的（创建 + 负责）
            </label>
            <label class="flex items-center gap-2 text-[14px]">
              <input type="radio" name="role-scope" class="accent-primary" />
              所属区域
            </label>
            <label class="flex items-center gap-2 text-[14px]">
              <input type="radio" name="role-scope" class="accent-primary" />
              不限制范围
            </label>
          </div>
        </div>
        <div class="flex justify-end gap-2 pt-2 border-t border-[rgba(201,205,212,.6)]">
          <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="perm">取消</button>
          <button class="h-9 px-3 rounded-lg bg-primary text-white text-[14px] font-semibold" data-close="perm" data-simulate-loading>保存权限</button>
        </div>
      </div>
    </div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
  </body>
</html>
