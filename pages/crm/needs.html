<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客户管理 · 商机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/tailwind-config.js"></script>
    <script>
      window.__APP_BASE = "../../";
    </script>
    <link rel="stylesheet" href="../../assets/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
    <style>
      .tab-btn[aria-current="page"]{background:rgba(255,138,0,.10); border-color: rgba(255,138,0,.55); color: var(--text);}
      .toast-wrap{position:fixed; right:16px; bottom:16px; z-index:60; display:flex; flex-direction:column; gap:10px;}
      .toast{min-width:280px; max-width:420px;}
    </style>
  </head>
  <body>
    <div class="app-shell min-h-screen flex">
      <div data-sidebar-root></div>

      <main class="flex-1 min-w-0">
        <header class="h-14 bg-surface border-b border-[rgba(201,205,212,.7)] px-4 flex items-center">
          <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]" title="折叠侧边栏" data-sidebar-toggle>
            <i class="fa-solid fa-bars text-muted"></i>
          </button>
        </header>

        <div class="p-4 space-y-4">
          <!-- 搜索区 -->
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="text-[16px] font-semibold">搜索查询</div>
              </div>
              <div class="flex gap-2">
                <button id="btnSearch" class="h-9 px-5 rounded-lg bg-primary text-white text-[14px] font-semibold" data-simulate-loading>搜索</button>
                <button id="btnReset" class="h-9 px-5 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold">重置</button>
                <button class="h-9 px-5 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold" data-perm="customer:manage" data-open-modal="need-edit">
                  <i class="fa-solid fa-plus text-muted mr-2"></i>新增商机
                </button>
              </div>
            </div>

            <div class="mt-3 grid grid-cols-12 gap-3">
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">客户名称（模糊）</div>
                <input id="qCustomer" class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" placeholder="请输入客户名称" />
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">区域</div>
                <select id="qRegion" class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]"></select>
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">创建人</div>
                <select id="qCreator" class="w-full h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]"></select>
              </div>
              <div class="col-span-3">
                <div class="text-[12px] text-muted mb-1">创建时间（日期范围）</div>
                <div class="grid grid-cols-2 gap-2">
                  <input id="qDateStart" type="date" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" />
                  <input id="qDateEnd" type="date" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" />
                </div>
              </div>
            </div>
          </section>

          <!-- 标签页：全部 / 我负责的 / 我下属负责的 -->
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
              <div class="flex gap-2">
                <button class="tab-btn h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-tab="all" aria-current="page">全部</button>
                <button class="tab-btn h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-tab="mine">我负责的</button>
                <button class="tab-btn h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-tab="subs">我下属负责的</button>
              </div>
            </div>
          </section>

          <!-- 列表区（批量按钮右上 + 分页下方） -->
          <section class="bg-surface rounded-xl shadow-card border border-[rgba(201,205,212,.6)] p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="text-[16px] font-semibold">商机列表</div>
              <div class="flex items-center gap-2">
                <button id="btnSelectAllPage" class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold">全选</button>
                <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold" data-perm="customer:manage" data-open-modal="export-selected">导出选中</button>
                <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] font-semibold" data-perm="customer:manage" data-open-modal="export-all">导出全部</button>
              </div>
            </div>

            <div class="mt-3 overflow-x-auto rounded-xl border border-[rgba(201,205,212,.6)]">
              <table class="w-full table min-w-[1200px]">
                <thead class="bg-[rgba(245,247,250,.9)]">
                  <tr>
                    <th class="text-left px-3 py-2 w-10"><input id="chkAll" type="checkbox" class="accent-primary" /></th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">客户名称</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">区域</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">商机编号</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">商机描述</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">创建人</th>
                    <th class="text-left px-3 py-2 whitespace-nowrap">创建时间</th>
                    <th class="text-right px-3 py-2 whitespace-nowrap">操作</th>
                  </tr>
                </thead>
                <tbody id="tbody" class="bg-surface"></tbody>
              </table>
            </div>

            <div class="mt-3 flex flex-wrap items-center justify-between gap-3 text-[13px] text-muted">
              <div>共 <span id="totalCount" class="text-text font-semibold">0</span> 条</div>
              <div class="flex flex-wrap items-center gap-3">
                <select id="pageSize" class="h-8 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-2 text-[13px]">
                  <option value="10">10条/页</option>
                  <option value="20">20条/页</option>
                  <option value="50">50条/页</option>
                </select>
                <div class="flex items-center gap-1">
                  <button id="prevPage" type="button" class="h-8 w-8 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface" aria-label="上一页"><i class="fa-solid fa-angle-left"></i></button>
                  <button id="pageNoBtn" type="button" class="h-8 w-8 rounded-lg bg-primary text-white font-semibold">1</button>
                  <button id="nextPage" type="button" class="h-8 w-8 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface" aria-label="下一页"><i class="fa-solid fa-angle-right"></i></button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- 新增/编辑商机 -->
    <div class="overlay" data-overlay="need-edit" data-open="false"></div>
    <div class="modal" data-modal="need-edit" data-open="false" style="max-width: 980px; width: min(980px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold" id="needModalTitle">新增商机</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="need-edit"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4 space-y-4">
        <div class="grid grid-cols-12 gap-4">
          <div class="col-span-6">
            <div class="text-[12px] text-muted mb-1">客户 <span class="text-[#F53F3F]">*</span></div>
            <select id="fCustomerId" class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]"></select>
            <div id="errCustomer" class="hidden text-[12px] text-[#F53F3F] mt-1">请选择客户</div>
          </div>
          <div class="col-span-6">
            <div class="text-[12px] text-muted mb-1">区域（关联，只读）</div>
            <input id="fRegion" class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px] bg-[rgba(245,247,250,.9)]" readonly />
          </div>

          <div class="col-span-6">
            <div class="flex items-center justify-between">
              <div class="text-[12px] text-muted mb-1">商机编号</div>
              <button id="btnAutoNo" type="button" class="text-primary text-[12px] font-semibold">自动生成</button>
            </div>
            <input id="fNo" class="w-full h-10 rounded-lg border border-[rgba(201,205,212,.7)] px-3 text-[14px]" placeholder="如：NX-2026-0001" />
          </div>
          <div class="col-span-12">
            <div class="text-[12px] text-muted mb-1">商机描述 <span class="text-[#F53F3F]">*</span></div>
            <textarea id="fDesc" rows="4" class="w-full rounded-lg border border-[rgba(201,205,212,.7)] px-3 py-2 text-[14px] resize-none" placeholder="请输入详细需求内容"></textarea>
            <div id="errDesc" class="hidden text-[12px] text-[#F53F3F] mt-1">商机描述不能为空</div>
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2 border-t border-[rgba(201,205,212,.6)]">
          <button class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="need-edit">取消</button>
          <button id="btnSave" class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold">确认</button>
        </div>
      </div>
    </div>

    <!-- 查看（仅展示） -->
    <div class="overlay" data-overlay="need-view" data-open="false"></div>
    <div class="modal" data-modal="need-view" data-open="false" style="max-width: 860px; width: min(860px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">商机详情</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="need-view"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4 space-y-3 text-[14px]">
        <div class="grid grid-cols-12 gap-3">
          <div class="col-span-6 p-3 rounded-xl bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]">
            <div class="text-[12px] text-muted">客户名称</div>
            <div class="font-semibold mt-1" id="vCustomer">—</div>
          </div>
          <div class="col-span-6 p-3 rounded-xl bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]">
            <div class="text-[12px] text-muted">区域</div>
            <div class="font-semibold mt-1" id="vRegion">—</div>
          </div>
          <div class="col-span-6 p-3 rounded-xl bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]">
            <div class="text-[12px] text-muted">商机编号</div>
            <div class="font-semibold mt-1" id="vNo">—</div>
          </div>
          <div class="col-span-6 p-3 rounded-xl bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]">
            <div class="text-[12px] text-muted">创建人</div>
            <div class="font-semibold mt-1" id="vCreator">—</div>
          </div>
          <div class="col-span-12 p-3 rounded-xl bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)]">
            <div class="text-[12px] text-muted">商机描述</div>
            <div class="mt-1 text-muted whitespace-pre-wrap" id="vDesc">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 删除二次确认 -->
    <div class="overlay" data-overlay="del" data-open="false"></div>
    <div class="modal" data-modal="del" data-open="false" style="max-width: 520px; width: min(520px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">确认删除</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="del"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4">
        <p class="text-[14px] text-muted">确定要删除该商机吗？删除后数据无法恢复。</p>
        <div class="mt-4 flex justify-end gap-2">
          <button class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="del">取消</button>
          <button id="btnDoDelete" class="h-9 px-4 rounded-lg bg-[#F53F3F] text-white text-[14px] font-semibold">删除</button>
        </div>
      </div>
    </div>

    <!-- 导出 -->
    <div class="overlay" data-overlay="export-selected" data-open="false"></div>
    <div class="modal" data-modal="export-selected" data-open="false" style="max-width: 560px; width: min(560px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">导出选中</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="export-selected"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4">
        <p class="text-[14px] text-muted">将导出勾选的商机数据（CSV）。</p>
        <div class="mt-4 flex justify-end gap-2">
          <button class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="export-selected">取消</button>
          <button id="btnExportSelected" class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold">开始导出</button>
        </div>
      </div>
    </div>

    <div class="overlay" data-overlay="export-all" data-open="false"></div>
    <div class="modal" data-modal="export-all" data-open="false" style="max-width: 560px; width: min(560px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">导出全部</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="export-all"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4">
        <p class="text-[14px] text-muted">将导出当前筛选条件下的所有商机数据（CSV）。</p>
        <div class="mt-4 flex justify-end gap-2">
          <button class="h-9 px-4 rounded-lg border border-[rgba(201,205,212,.7)] text-[14px] font-semibold" data-close="export-all">取消</button>
          <button id="btnExportAll" class="h-9 px-4 rounded-lg bg-primary text-white text-[14px] font-semibold">开始导出</button>
        </div>
      </div>
    </div>

    <!-- 导出进度 -->
    <div class="overlay" data-overlay="exporting" data-open="false"></div>
    <div class="modal" data-modal="exporting" data-open="false" style="max-width: 560px; width: min(560px, 96vw);">
      <div class="p-4 border-b border-[rgba(201,205,212,.7)] flex items-center justify-between">
        <div class="text-[16px] font-semibold">导出中</div>
        <button class="w-9 h-9 rounded-lg hover:bg-[rgba(245,247,250,.9)]" data-close="exporting"><i class="fa-solid fa-xmark text-muted"></i></button>
      </div>
      <div class="p-4">
        <div class="p-3 rounded-xl bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)] text-[13px] text-muted">
          <i class="fa-solid fa-spinner fa-spin mr-2"></i>正在生成导出文件，请稍候…
        </div>
        <div class="mt-3 hidden" id="exportDoneBox">
          <a id="exportDownloadLink" class="text-primary font-semibold" href="#" download>点击下载导出文件</a>
        </div>
      </div>
    </div>

    <div class="toast-wrap" id="toasts"></div>

    <script src="../../assets/sidebar.js"></script>
    <script src="../../assets/app.js"></script>
    <script>
      // ===== 权限控制（原型示例）=====
      const currentUser = {
        id: "E-002",
        name: "李雷",
        subordinateIds: ["E-003"],
        permissions: ["customer:manage"],
      };
      const hasPerm = (p) => currentUser.permissions.includes(p);
      document.querySelectorAll("[data-perm]").forEach((el) => {
        const p = el.getAttribute("data-perm");
        if (!hasPerm(p)) el.classList.add("hidden");
      });

      // ===== 工具 =====
      function escapeHtml(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
      function openModal(id) {
        const ov = document.querySelector(`[data-overlay="${id}"]`);
        const m = document.querySelector(`[data-modal="${id}"]`);
        if (ov) ov.dataset.open = "true";
        if (m) m.dataset.open = "true";
      }
      function closeModal(id) {
        const ov = document.querySelector(`[data-overlay="${id}"]`);
        const m = document.querySelector(`[data-modal="${id}"]`);
        if (ov) ov.dataset.open = "false";
        if (m) m.dataset.open = "false";
      }
      function toast(type, title, desc) {
        const color = type === "success" ? "rgba(0,180,42,.12)" : type === "error" ? "rgba(245,63,63,.10)" : "rgba(255,125,0,.10)";
        const border = type === "success" ? "rgba(0,180,42,.25)" : type === "error" ? "rgba(245,63,63,.25)" : "rgba(255,125,0,.25)";
        const icon = type === "success" ? "fa-circle-check" : type === "error" ? "fa-circle-xmark" : "fa-triangle-exclamation";
        const wrap = document.getElementById("toasts");
        const el = document.createElement("div");
        el.className = "toast bg-surface rounded-xl border shadow-card";
        el.style.borderColor = border;
        el.innerHTML = `
          <div class="p-3 flex gap-3" style="background:${color}">
            <i class="fa-solid ${icon} text-muted mt-0.5"></i>
            <div class="min-w-0">
              <div class="text-[14px] font-semibold">${escapeHtml(title)}</div>
              ${desc ? `<div class="text-[12px] text-muted mt-0.5">${escapeHtml(desc)}</div>` : ""}
            </div>
            <button class="ml-auto w-8 h-8 rounded-lg hover:bg-[rgba(245,247,250,.9)]" title="关闭"><i class="fa-solid fa-xmark text-muted"></i></button>
          </div>
        `;
        el.querySelector("button").addEventListener("click", () => el.remove());
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 2600);
      }
      function setFieldError(inputEl, errEl, on) {
        if (on) {
          inputEl.classList.add("border-[#F53F3F]");
          errEl.classList.remove("hidden");
        } else {
          inputEl.classList.remove("border-[#F53F3F]");
          errEl.classList.add("hidden");
        }
      }

      // ===== mock：客户/区域/创建人 =====
      const creators = [
        { id: "E-001", name: "张敏" },
        { id: "E-002", name: "李雷" },
        { id: "E-003", name: "王芳" },
      ];
      const regions = ["全部区域", "上海大区", "苏州片区", "北京片区"];
      /** @type {{id:string,name:string,region:string,ownerId:string}[]} */
      let customers = [
        { id: "C-0001", name: "苏州XX半导体设备有限公司", region: "苏州片区", ownerId: "E-002" },
        { id: "C-0004", name: "上海某某PCB有限公司", region: "上海大区", ownerId: "E-001" },
        { id: "C-0005", name: "北京某某研究院", region: "北京片区", ownerId: "E-003" },
      ];

      // 筛选下拉
      const qRegion = document.getElementById("qRegion");
      regions.forEach((r, idx) => {
        const o = document.createElement("option");
        o.value = idx === 0 ? "" : r;
        o.textContent = r;
        qRegion.appendChild(o);
      });
      const qCreator = document.getElementById("qCreator");
      const phC = document.createElement("option");
      phC.value = "";
      phC.textContent = "全部创建人";
      qCreator.appendChild(phC);
      creators.forEach((c) => {
        const o = document.createElement("option");
        o.value = c.id;
        o.textContent = c.name;
        qCreator.appendChild(o);
      });

      // ===== needs data =====
      /** @type {{id:string,customerId:string,region:string,no:string,desc:string,createdById:string,createdByName:string,createdAt:string}[]} */
      let needs = [
        { id: "N-1", customerId: "C-0001", region: "苏州片区", no: "NX-2026-0001", desc: "贴片机产线升级，包含供料/回流/检测整体方案。", createdById: "E-002", createdByName: "李雷", createdAt: "2026-04-10 10:22" },
        { id: "N-2", customerId: "C-0004", region: "上海大区", no: "NX-2026-0002", desc: "设备维保服务，要求7*24响应，季度巡检。", createdById: "E-001", createdByName: "张敏", createdAt: "2026-04-09 09:40" },
        { id: "N-3", customerId: "C-0005", region: "北京片区", no: "NX-2026-0003", desc: "科研项目合作，需求实验室设备采购与安装。", createdById: "E-003", createdByName: "王芳", createdAt: "2026-04-12 14:20" },
      ];

      function getCustomer(id) {
        return customers.find((c) => c.id === id) || null;
      }

      // 数据权限说明（示例）：这里展示全部，但操作只允许创建人
      function passesQuery(row) {
        const custNameQ = (document.getElementById("qCustomer").value || "").trim();
        const regionQ = document.getElementById("qRegion").value || "";
        const creatorQ = document.getElementById("qCreator").value || "";
        const ds = document.getElementById("qDateStart").value || "";
        const de = document.getElementById("qDateEnd").value || "";

        const cust = getCustomer(row.customerId);
        const custName = cust?.name || "";
        if (custNameQ && !custName.includes(custNameQ)) return false;
        if (regionQ && row.region !== regionQ) return false;
        if (creatorQ && row.createdById !== creatorQ) return false;
        if (ds && row.createdAt.slice(0, 10) < ds) return false;
        if (de && row.createdAt.slice(0, 10) > de) return false;
        return true;
      }

      // 标签页：全部 / 我负责的 / 我下属负责的
      let activeTab = "all";
      function passesTab(row) {
        if (activeTab === "mine") return row.createdById === currentUser.id;
        if (activeTab === "subs") return currentUser.subordinateIds.includes(row.createdById);
        return true;
      }

      // ===== pagination & selection =====
      let pageNo = 1;
      const tbody = document.getElementById("tbody");
      const totalCount = document.getElementById("totalCount");
      const pageSize = document.getElementById("pageSize");
      const prevPage = document.getElementById("prevPage");
      const nextPage = document.getElementById("nextPage");
      const pageNoBtn = document.getElementById("pageNoBtn");
      const chkAll = document.getElementById("chkAll");

      function paged(rows) {
        const size = parseInt(pageSize.value, 10);
        const total = rows.length;
        const pages = Math.max(1, Math.ceil(total / size));
        pageNo = Math.min(pageNo, pages);
        const start = (pageNo - 1) * size;
        return { total, pages, slice: rows.slice(start, start + size) };
      }
      function getSelectedIds() {
        return Array.from(document.querySelectorAll("[data-row-chk]:checked")).map((c) => c.getAttribute("data-row-chk"));
      }
      function guardSelection() {
        const ids = getSelectedIds();
        if (!ids.length) {
          toast("error", "未选择记录", "请先勾选至少一条商机");
          return null;
        }
        return ids;
      }

      // ===== render =====
      function render() {
        const filtered = needs.filter(passesQuery).filter(passesTab);
        const { total, pages, slice } = paged(filtered);
        totalCount.textContent = String(total);
        pageNoBtn.textContent = String(pageNo);
        prevPage.disabled = pageNo <= 1;
        nextPage.disabled = pageNo >= pages;

        tbody.innerHTML = slice
          .map((r) => {
            const custName = getCustomer(r.customerId)?.name || "—";
            const viewBtn = `<button class="text-primary font-semibold" data-view="${r.id}">查看</button>`;
            const canEditDel = r.createdById === currentUser.id; // 仅创建人
            const editBtn = canEditDel ? `<button class="text-primary font-semibold" data-edit="${r.id}">编辑</button>` : "";
            const delBtn = canEditDel ? `<button class="text-[#F53F3F] font-semibold" data-del="${r.id}">删除</button>` : "";
            const ops = `${viewBtn}${editBtn ? `\n                  ${editBtn}` : ""}${delBtn ? `\n                  ${delBtn}` : ""}`;
            return `
              <tr class="border-t border-[rgba(201,205,212,.6)]">
                <td class="px-3 py-3"><input type="checkbox" class="accent-primary" data-row-chk="${r.id}" /></td>
                <td class="px-3 py-3 font-semibold whitespace-nowrap">${escapeHtml(custName)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${escapeHtml(r.region)}</td>
                <td class="px-3 py-3 whitespace-nowrap text-muted text-[13px]">${escapeHtml(r.no || "—")}</td>
                <td class="px-3 py-3 min-w-[420px]">${escapeHtml(r.desc)}</td>
                <td class="px-3 py-3 whitespace-nowrap">${escapeHtml(r.createdByName)}</td>
                <td class="px-3 py-3 whitespace-nowrap text-muted text-[13px]">${escapeHtml(r.createdAt)}</td>
                <td class="px-3 py-3 text-right whitespace-nowrap space-x-3">${ops}</td>
              </tr>
            `;
          })
          .join("");

        chkAll.checked = false;
        bindRowActions();
      }

      // ===== modal create/edit/view =====
      const needModalTitle = document.getElementById("needModalTitle");
      const fCustomerId = document.getElementById("fCustomerId");
      const fRegion = document.getElementById("fRegion");
      const fNo = document.getElementById("fNo");
      const fDesc = document.getElementById("fDesc");
      const errCustomer = document.getElementById("errCustomer");
      const errDesc = document.getElementById("errDesc");
      let editingId = null;

      function fillCustomerOptions() {
        fCustomerId.innerHTML = "";
        const ph = document.createElement("option");
        ph.value = "";
        ph.textContent = "请选择客户";
        fCustomerId.appendChild(ph);
        customers.forEach((c) => {
          const o = document.createElement("option");
          o.value = c.id;
          o.textContent = c.name;
          fCustomerId.appendChild(o);
        });
      }
      fillCustomerOptions();
      fCustomerId.addEventListener("change", () => {
        const c = getCustomer(fCustomerId.value);
        fRegion.value = c?.region || "";
      });

      function autoNo() {
        const y = new Date().getFullYear();
        const seq = String(Math.floor(Math.random() * 9000) + 1000);
        fNo.value = `NX-${y}-${seq}`;
      }
      document.getElementById("btnAutoNo").addEventListener("click", autoNo);

      function resetForm() {
        editingId = null;
        needModalTitle.textContent = "新增商机";
        fCustomerId.value = "";
        fRegion.value = "";
        fNo.value = "";
        fDesc.value = "";
        setFieldError(fCustomerId, errCustomer, false);
        setFieldError(fDesc, errDesc, false);
      }
      function openCreate() {
        resetForm();
        autoNo();
        openModal("need-edit");
      }
      function openEdit(id) {
        const row = needs.find((x) => x.id === id);
        if (!row) return;
        if (row.createdById !== currentUser.id) {
          toast("error", "无权限", "仅创建人可编辑自己的商机");
          return;
        }
        editingId = id;
        needModalTitle.textContent = "编辑商机";
        fCustomerId.value = row.customerId;
        fRegion.value = row.region;
        fNo.value = row.no || "";
        fDesc.value = row.desc;
        setFieldError(fCustomerId, errCustomer, false);
        setFieldError(fDesc, errDesc, false);
        openModal("need-edit");
      }
      function openView(id) {
        const row = needs.find((x) => x.id === id);
        if (!row) return;
        const custName = getCustomer(row.customerId)?.name || "—";
        document.getElementById("vCustomer").textContent = custName;
        document.getElementById("vRegion").textContent = row.region;
        document.getElementById("vNo").textContent = row.no || "—";
        document.getElementById("vCreator").textContent = row.createdByName;
        document.getElementById("vDesc").textContent = row.desc;
        openModal("need-view");
      }

      // ===== delete =====
      let deletingId = null;
      function openDelete(id) {
        const row = needs.find((x) => x.id === id);
        if (!row) return;
        if (row.createdById !== currentUser.id) {
          toast("error", "无权限", "仅创建人可删除自己的商机");
          return;
        }
        deletingId = id;
        openModal("del");
      }

      function bindRowActions() {
        document.querySelectorAll("[data-view]").forEach((b) => b.addEventListener("click", () => openView(b.getAttribute("data-view"))));
        document.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => openEdit(b.getAttribute("data-edit"))));
        document.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => openDelete(b.getAttribute("data-del"))));
      }

      // ===== buttons =====
      document.getElementById("btnSearch").addEventListener("click", () => {
        pageNo = 1;
        toast("success", "已应用筛选", "列表已更新");
        render();
      });
      document.getElementById("btnReset").addEventListener("click", () => {
        document.getElementById("qCustomer").value = "";
        document.getElementById("qRegion").value = "";
        document.getElementById("qCreator").value = "";
        document.getElementById("qDateStart").value = "";
        document.getElementById("qDateEnd").value = "";
        pageNo = 1;
        toast("success", "已重置", "已恢复默认筛选条件");
        render();
      });

      document.querySelectorAll("[data-open-modal]").forEach((b) => {
        const id = b.getAttribute("data-open-modal");
        b.addEventListener("click", () => {
          if (id === "need-edit") openCreate();
          else openModal(id);
        });
      });

      // tabs
      document.querySelectorAll(".tab-btn[data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeTab = btn.getAttribute("data-tab");
          document.querySelectorAll(".tab-btn[data-tab]").forEach((b) => {
            b.setAttribute("aria-current", b.getAttribute("data-tab") === activeTab ? "page" : "false");
          });
          pageNo = 1;
          chkAll.checked = false;
          toast("success", "已切换标签页", activeTab === "all" ? "全部" : activeTab === "mine" ? "我负责的" : "我下属负责的");
          render();
        });
      });

      document.getElementById("btnSelectAllPage").addEventListener("click", () => {
        document.querySelectorAll("[data-row-chk]").forEach((c) => (c.checked = true));
        chkAll.checked = true;
        toast("success", "已全选", "已勾选当前页商机");
      });
      chkAll.addEventListener("change", () => {
        const v = chkAll.checked;
        document.querySelectorAll("[data-row-chk]").forEach((c) => (c.checked = v));
      });

      pageSize.addEventListener("change", () => {
        pageNo = 1;
        render();
      });
      prevPage.addEventListener("click", () => {
        pageNo = Math.max(1, pageNo - 1);
        render();
      });
      nextPage.addEventListener("click", () => {
        pageNo = pageNo + 1;
        render();
      });

      // save
      document.getElementById("btnSave").addEventListener("click", () => {
        if (!hasPerm("customer:manage")) {
          toast("error", "无权限", "当前用户无客户管理权限，无法操作");
          return;
        }
        const customerId = fCustomerId.value;
        const region = fRegion.value;
        const no = (fNo.value || "").trim();
        const desc = (fDesc.value || "").trim();

        const badCustomer = !customerId;
        const badDesc = !desc;
        setFieldError(fCustomerId, errCustomer, badCustomer);
        setFieldError(fDesc, errDesc, badDesc);
        if (badCustomer || badDesc) {
          toast("error", "保存失败", "请先补全必填字段");
          return;
        }

        const btn = document.getElementById("btnSave");
        const old = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>保存中...';
        setTimeout(() => {
          if (editingId) {
            const row = needs.find((x) => x.id === editingId);
            if (row && row.createdById === currentUser.id) {
              row.customerId = customerId;
              row.region = region;
              row.no = no;
              row.desc = desc;
            }
            toast("success", "编辑成功", "商机编辑成功");
          } else {
            const id = `N-${String(Math.floor(Math.random() * 9000) + 1000)}`;
            needs.unshift({
              id,
              customerId,
              region,
              no,
              desc,
              createdById: currentUser.id,
              createdByName: currentUser.name,
              createdAt: new Date().toISOString().slice(0, 19).replace("T", " "),
            });
            toast("success", "创建成功", "商机创建成功");
          }
          btn.disabled = false;
          btn.innerHTML = old;
          closeModal("need-edit");
          pageNo = 1;
          render();
        }, 850);
      });

      // delete confirm
      document.getElementById("btnDoDelete").addEventListener("click", () => {
        if (!hasPerm("customer:manage")) {
          toast("error", "无权限", "当前用户无客户管理权限，无法删除");
          return;
        }
        if (!deletingId) return;
        const row = needs.find((x) => x.id === deletingId);
        if (!row || row.createdById !== currentUser.id) {
          toast("error", "无权限", "仅创建人可删除自己的记录");
          closeModal("del");
          return;
        }
        const btn = document.getElementById("btnDoDelete");
        const old = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>删除中...';
        setTimeout(() => {
          needs = needs.filter((x) => x.id !== deletingId);
          deletingId = null;
          btn.disabled = false;
          btn.innerHTML = old;
          closeModal("del");
          toast("success", "删除成功", "商机已删除");
          render();
        }, 750);
      });

      // export
      let exportUrl = null;
      function exportCsv(rows, filename) {
        const header = ["客户名称", "区域", "商机编号", "商机描述", "创建人", "创建时间"];
        const lines = [header.join(",")];
        rows.forEach((r) => {
          const custName = getCustomer(r.customerId)?.name || "";
          lines.push([custName, r.region, r.no || "", r.desc, r.createdByName, r.createdAt].map((x) => `"${String(x ?? "").replaceAll('"', '""')}"`).join(","));
        });
        const blob = new Blob(["\uFEFF" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        return { url, filename };
      }
      function startExport(rows, filename) {
        if (!hasPerm("customer:manage")) {
          toast("error", "无权限", "当前用户无客户管理权限，无法导出");
          return;
        }
        document.getElementById("exportDoneBox").classList.add("hidden");
        openModal("exporting");
        toast("warn", "导出中", "正在生成导出文件，请稍候");
        setTimeout(() => {
          if (exportUrl) URL.revokeObjectURL(exportUrl);
          const out = exportCsv(rows, filename);
          exportUrl = out.url;
          const a = document.getElementById("exportDownloadLink");
          a.href = out.url;
          a.download = out.filename;
          document.getElementById("exportDoneBox").classList.remove("hidden");
          toast("success", "导出完成", "文件已生成，可点击下载");
        }, 900);
      }
      document.getElementById("btnExportSelected").addEventListener("click", () => {
        const ids = guardSelection();
        if (!ids) return;
        closeModal("export-selected");
        const rows = needs.filter((n) => ids.includes(n.id)).filter(passesQuery);
        startExport(rows, "商机-选中.csv");
      });
      document.getElementById("btnExportAll").addEventListener("click", () => {
        closeModal("export-all");
        const rows = needs.filter(passesQuery);
        startExport(rows, "商机-全部.csv");
      });

      // overlay click close
      document.querySelectorAll("[data-overlay]").forEach((ov) => {
        ov.addEventListener("click", () => closeModal(ov.getAttribute("data-overlay")));
      });

      // init
      render();
    </script>
  </body>
</html>
