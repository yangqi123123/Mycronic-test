      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

        return String(name || "")
          .replace(/有限公司|有限责任公司|股份有限公司|集团|公司|研究院|研究所|分公司/g, "")
          .slice(0, 2);
      }

        const m = String(s || "").replace(/,/g, "").match(/[\d.]+/);
        return m ? parseFloat(m[0]) : 0;
      }

        if (s === "注销") return "chip chip--danger";
        if (s === "迁入" || s === "迁出") return "chip chip--primary";
        if (s === "停业" || s === "清算") return "chip chip--warning";
        return "chip chip--primary";
      }

        if (m) m.dataset.open = open ? "true" : "false";
      }
      function openModal(id) { setModalOpen(id, true); }

        let count = 0;
        function walk(node) {
          if (!node || !node.items) return;
          node.items.forEach((item) => {
            if (item.type === "condition" && item.field) count++;
            else if (item.type === "group") walk(item);
          });
        }
        walk(root);
        return count;
      }

          "项目名称": "projectName",
          "项目编号": "projectNo",
          "采集器": "collector",
          "数据来源": "source",
          "采集时间": "collectedAt",
          "经营范围": "scope",
          "关键需求摘要": "needSummary",
        };
        return row[map[field]];
      }

      function evaluateCondition(cond, row) {
        if (!cond.field) return true;
        const def = getFieldDef(cond.field);
        let raw = getValue(row, cond.field);
        raw = raw == null ? "" : String(raw);
        const val = String(cond.value || "");
        const val2 = String(cond.value2 || "");
        const op = cond.operator || DEFAULT_OPERATOR[def.type] || "包含";

        if (def.type === "date") {
          const a = raw.slice(0, 10);
          const b = val.slice(0, 10);
          const b2 = val2.slice(0, 10);
          if (op === "等于") return a === b;
          if (op === "大于") return a > b;
          if (op === "小于") return a < b;
          if (op === "在...之间") return b <= a && a <= b2;
          return true;
        }

        if (def.type === "number") {
          const a = Number.parseFloat(raw);
          const b = Number.parseFloat(val);
          if (Number.isNaN(a) || Number.isNaN(b)) return false;
          if (op === "等于") return a === b;
          if (op === "大于") return a > b;
          if (op === "小于") return a < b;
          if (op === "大于等于") return a >= b;
          if (op === "小于等于") return a <= b;
          return true;
        }

        if (def.type === "select") {
          if (op === "等于") return raw === val;
          if (op === "不等于") return raw !== val;
          return true;
        }

        // text / contact: support multi-tag input
        const tags = Array.isArray(cond.tags) ? cond.tags.filter(Boolean) : [];
        const vals = tags.length ? tags : [val];
        if (!vals.length || (vals.length === 1 && vals[0] === "")) return true;
        if (op === "包含任一") return vals.some((v) => raw.includes(v));
        if (op === "包含全部") return vals.every((v) => raw.includes(v));
        if (op === "不等于") return vals.every((v) => raw !== v);
        if (op === "大于") return vals.length > 0 && raw > vals[0];
        if (op === "小于") return vals.length > 0 && raw < vals[0];
        return true;
      }

      function evaluateGroup(group, row) {
        if (!group || !group.items || !group.items.length) return true;
        const results = group.items.map((item) => {
          if (item.type === "condition") return evaluateCondition(item, row);
          if (item.type === "group") return evaluateGroup(item, row);
          return true;
        });
        return group.op === "any" ? results.some(Boolean) : results.every(Boolean);
      }

      function parsePath(str) {
        return str ? str.split(",").map(Number) : [];
      }

      function getItemByPath(path) {
        let node = filterRoot;
        for (let i = 0; i < path.length - 1; i++) {
          const item = node.items[path[i]];
          node = item;
        }
        return { parent: node, index: path[path.length - 1] };
      }

      function getGroupByPath(path) {
        if (path.length === 0) return filterRoot;
        let node = filterRoot;
        for (let i = 0; i < path.length; i++) {
          const item = node.items[path[i]];
          if (item && item.type === "group") node = item;
        }
        return node;
      }

      function updateCondition(path, key, value) {
        const { parent, index } = getItemByPath(path);
        if (parent.items && parent.items[index]) {
          parent.items[index][key] = value;
        }
      }

      function addCondition(path) {
        const target = getGroupByPath(path);
        target.items.push({ type: "condition", field: "", operator: "包含", value: "", value2: "", tags: [] });
        renderBuilder();
      }

      function addGroup(path) {
        const target = getGroupByPath(path);
        target.items.push({
          type: "group",
          op: "all",
          items: [{ type: "condition", field: "", operator: "包含", value: "", value2: "", tags: [] }],
        });
        renderBuilder();
      }

      function removeItem(path) {
        const { parent, index } = getItemByPath(path);
        parent.items.splice(index, 1);
        renderBuilder();
      }

      function setGroupOp(path, op) {
        const target = getGroupByPath(path);
        target.op = op;
      }

      function openFieldPool(path) {
        fieldPoolTarget = { path };
        const searchInput = document.getElementById("fieldPoolSearch");
        if (searchInput) searchInput.value = "";
        renderFieldPool();
        openModal("field-pool");
      }

      function selectField(field) {
        if (!fieldPoolTarget) return;
        const { path } = fieldPoolTarget;
        const def = getFieldDef(field);
        const { parent, index } = getItemByPath(path);
        const cond = parent.items[index];
        if (cond.type === "condition") {
          cond.field = field;
          cond.operator = DEFAULT_OPERATOR[def.type] || "包含";
          cond.value = "";
          cond.value2 = "";
          cond.tags = [];
        }
        closeModal("field-pool");
        fieldPoolTarget = null;
        renderBuilder();
      }

      function renderFieldPool() {
        const tabsWrap = document.getElementById("fieldPoolTabs");
        const panelsWrap = document.getElementById("fieldPoolPanels");

        tabsWrap.innerHTML = CATEGORIES
          .map(
            (c) => `
            <button class="field-pool-category w-full text-left px-4 py-2.5 text-[14px] hover:bg-[rgba(245,247,250,.9)] ${c === activePoolCategory ? "active" : ""}" data-category="${escapeHtml(c)}">
              ${escapeHtml(c)}
            </button>
          `
          )
          .join("");

        const searchInput = document.getElementById("fieldPoolSearch");
        const kw = (searchInput ? searchInput.value : "").trim();
        let fields;
        let panelTitle;
        if (kw) {
          fields = Object.entries(FIELD_CATALOG).filter(([name]) => name.includes(kw));
          panelTitle = `搜索 “${kw}” 共 ${fields.length} 个字段`;
        } else {
          fields = Object.entries(FIELD_CATALOG).filter(([_, def]) => def.category === activePoolCategory);
          panelTitle = `${activePoolCategory}字段`;
        }
        panelsWrap.innerHTML = `
          <div>
            <div class="text-[13px] text-muted mb-3">${escapeHtml(panelTitle)}</div>
            <div class="flex flex-wrap gap-2">
              ${fields.length
                ? fields
                    .map(
                      ([name, def]) => `
                    <button class="px-3 py-1.5 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[13px] hover:border-primary hover:text-primary flex items-center gap-1.5" data-field="${escapeHtml(name)}">
                      <span>${escapeHtml(name)}</span>
                      ${kw ? `<span class="text-[11px] text-muted">${escapeHtml(def.category)}</span>` : ""}
                    </button>
                  `
                    )
                    .join("")
                : `<div class="text-[13px] text-muted">未找到匹配字段</div>`}
            </div>
          </div>
        `;

        tabsWrap.querySelectorAll("[data-category]").forEach((btn) => {
          btn.addEventListener("click", () => {
            activePoolCategory = btn.getAttribute("data-category");
            if (searchInput) searchInput.value = "";
            renderFieldPool();
          });
        });
        panelsWrap.querySelectorAll("[data-field]").forEach((btn) => {
          btn.addEventListener("click", () => selectField(btn.getAttribute("data-field")));
        });
      }

      function renderValueInput(cond, def, pathStr) {
        if (cond.operator === "在...之间" && def.type === "date") {
          return `
            <input type="date" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" value="${escapeHtml(cond.value)}" data-path="${pathStr}" data-key="value" />
            <span class="text-[13px] text-muted">至</span>
            <input type="date" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" value="${escapeHtml(cond.value2)}" data-path="${pathStr}" data-key="value2" />
          `;
        }
        if (def.type === "date") {
          return `<input type="date" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" value="${escapeHtml(cond.value)}" data-path="${pathStr}" data-key="value" />`;
        }
        if (def.type === "select") {
          return `
            <select class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" data-path="${pathStr}" data-key="value">
              <option value="">请选择</option>
              ${def.options.map((o) => `<option ${cond.value === o ? "selected" : ""}>${escapeHtml(o)}</option>`).join("")}
            </select>
          `;
        }
        if (def.type === "number") {
          return `<input type="number" class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" placeholder="请输入数值" value="${escapeHtml(cond.value)}" data-path="${pathStr}" data-key="value" />`;
        }

        // text / contact: tag input
        const tags = Array.isArray(cond.tags) ? cond.tags : [];
        const tagsHtml = tags
          .map(
            (t) => `
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-[rgba(245,247,250,.9)] border border-[rgba(201,205,212,.6)] text-[13px]">
              <span class="truncate max-w-[200px]">${escapeHtml(t)}</span>
              <button class="tag-remove w-4 h-4 rounded hover:bg-[rgba(201,205,212,.5)] flex items-center justify-center" data-tag="${escapeHtml(t)}">
                <i class="fa-solid fa-xmark text-[10px]"></i>
              </button>
            </span>
          `
          )
          .join("");
        return `
          <div class="flex items-start gap-2 flex-1 min-w-[360px] max-w-[720px]">
            <div class="tag-input flex-1 min-h-[42px] rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-2 py-1.5 flex flex-wrap gap-2 items-center" data-path="${pathStr}">
              ${tagsHtml}
              <input type="text" class="tag-input-field flex-1 min-w-[120px] h-7 bg-transparent outline-none text-[14px]" placeholder="${tags.length ? "" : "单个词不超过30个字符;最多20个词;回车键隔开"}" />
            </div>
            <button class="tag-copy h-9 w-9 shrink-0 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-muted hover:text-primary flex items-center justify-center" data-path="${pathStr}" title="复制">
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
        `;
      }

      function renderCondition(cond, path) {
        const pathStr = path.join(",");
        if (!cond.field) {
          return `
            <div class="filter-row relative flex items-center gap-3 py-2 pl-6">
              <button class="h-9 px-4 rounded-lg border border-dashed border-[rgba(201,205,212,.9)] bg-surface text-[14px] text-muted hover:border-primary hover:text-primary flex items-center gap-2" data-open-field="${pathStr}">
                <i class="fa-solid fa-chevron-down text-[11px]"></i> 请选择类型
              </button>
            </div>
          `;
        }

        const def = getFieldDef(cond.field);
        const ops = OPERATORS[def.type] || OPERATORS.text;
        const valueHtml = renderValueInput(cond, def, pathStr);

        return `
          <div class="filter-row relative flex flex-wrap items-center gap-3 py-2 pl-6">
            <button class="h-9 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[14px] hover:border-primary hover:text-primary" data-open-field="${pathStr}">
              ${escapeHtml(cond.field)} <i class="fa-solid fa-chevron-down text-[11px] ml-1"></i>
            </button>
            <select class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" data-path="${pathStr}" data-key="operator">
              ${ops.map((o) => `<option value="${escapeHtml(o)}" ${cond.operator === o ? "selected" : ""}>${escapeHtml(o)}</option>`).join("")}
            </select>
            ${valueHtml}
            <button class="w-7 h-7 rounded-full border border-[rgba(245,63,63,.4)] text-[rgba(245,63,63,.8)] hover:bg-[rgba(245,63,63,.08)] flex items-center justify-center" data-remove="${pathStr}" title="删除条件">
              <i class="fa-solid fa-minus text-[11px]"></i>
            </button>
          </div>
        `;
      }

      function renderGroup(group, path) {
        const isRoot = path.length === 0;
        const itemsHtml = group.items
          .map((item, idx) => {
            const itemPath = [...path, idx];
            if (item.type === "condition") return renderCondition(item, itemPath);
            if (item.type === "group") return renderGroup(item, itemPath);
            return "";
          })
          .join("");

        return `
          <div class="filter-group ${isRoot ? "" : "ml-6 mt-2 border-l border-[rgba(201,205,212,.6)] pl-4"}">
            <div class="flex items-center gap-3 py-2">
              <span class="text-[13px] text-muted">满足下列</span>
              <select class="h-9 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface px-3 text-[14px]" data-group-op="${path.join(",")}">
                <option value="all" ${group.op === "all" ? "selected" : ""}>所有</option>
                <option value="any" ${group.op === "any" ? "selected" : ""}>任一</option>
              </select>
              <span class="text-[13px] text-muted">条件：</span>
              ${isRoot ? "" : `<button class="w-7 h-7 rounded-full border border-[rgba(245,63,63,.4)] text-[rgba(245,63,63,.8)] hover:bg-[rgba(245,63,63,.08)] flex items-center justify-center" data-remove="${path.join(",")}" title="删除组合"><i class="fa-solid fa-minus text-[11px]"></i></button>`}
            </div>
            <div class="space-y-1">${itemsHtml}</div>
            <div class="flex items-center gap-3 py-3">
              <button class="h-8 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[13px] font-semibold hover:border-primary hover:text-primary flex items-center gap-1.5" data-add-condition="${path.join(",")}">
                <i class="fa-solid fa-plus text-[11px]"></i> 添加单个条件
              </button>
              <button class="h-8 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[13px] font-semibold hover:border-primary hover:text-primary flex items-center gap-1.5" data-add-group="${path.join(",")}">
                <i class="fa-solid fa-plus text-[11px]"></i> 添加条件组合
              </button>
            </div>
          </div>
        `;
      }

      function renderBuilder() {
        document.getElementById("filterBuilder").innerHTML = renderGroup(filterRoot, []);
        document.getElementById("selectedConditionCount").textContent = String(countConditions(filterRoot));

        // bind field selection
        document.querySelectorAll("[data-open-field]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const path = parsePath(btn.getAttribute("data-open-field"));
            openFieldPool(path);
          });
        });

        // bind operator / value changes
        document.querySelectorAll("#filterBuilder [data-path]").forEach((el) => {
          el.addEventListener("change", () => {
            const path = parsePath(el.getAttribute("data-path"));
            const key = el.getAttribute("data-key");
            updateCondition(path, key, el.value);
            if (key === "operator") renderBuilder();
          });
        });

        // bind group op
        document.querySelectorAll("[data-group-op]").forEach((sel) => {
          sel.addEventListener("change", () => {
            const path = parsePath(sel.getAttribute("data-group-op"));
            setGroupOp(path, sel.value);
          });
        });

        // bind add/remove
        document.querySelectorAll("[data-add-condition]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const path = parsePath(btn.getAttribute("data-add-condition"));
            addCondition(path);
          });
        });
        document.querySelectorAll("[data-add-group]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const path = parsePath(btn.getAttribute("data-add-group"));
            addGroup(path);
          });
        });
        document.querySelectorAll("[data-remove]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const path = parsePath(btn.getAttribute("data-remove"));
            removeItem(path);
          });
        });

        // tag input
        document.querySelectorAll(".tag-input").forEach((wrap) => {
          const path = parsePath(wrap.getAttribute("data-path"));
          const field = wrap.querySelector(".tag-input-field");
          if (field) {
            field.addEventListener("keydown", (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                addTag(path, field.value);
              }
            });
          }
          wrap.querySelectorAll(".tag-remove").forEach((btn) => {
            btn.addEventListener("click", () => removeTag(path, btn.getAttribute("data-tag")));
          });
        });
        document.querySelectorAll(".tag-copy").forEach((btn) => {
          const path = parsePath(btn.getAttribute("data-path"));
          btn.addEventListener("click", () => copyTags(path));
        });
      }

      function addTag(path, text) {
        const t = text.trim();
        if (!t) return;
        if (t.length > 30) {
          alert("单个词不超过30个字符");
          return;
        }
        const { parent, index } = getItemByPath(path);
        const cond = parent.items[index];
        if (cond.type !== "condition") return;
        const tags = Array.isArray(cond.tags) ? cond.tags : [];
        if (tags.includes(t)) return;
        if (tags.length >= 20) {
          alert("最多20个词");
          return;
        }
        tags.push(t);
        cond.tags = tags;
        renderBuilder();
      }

      function removeTag(path, tag) {
        const { parent, index } = getItemByPath(path);
        const cond = parent.items[index];
        if (cond.type !== "condition") return;
        cond.tags = (Array.isArray(cond.tags) ? cond.tags : []).filter((x) => x !== tag);
        renderBuilder();
      }

      function copyTags(path) {
        const { parent, index } = getItemByPath(path);
        const cond = parent.items[index];
        const tags = Array.isArray(cond.tags) ? cond.tags : [];
        const text = tags.join("\n");
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => alert("已复制到剪贴板"));
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          alert("已复制到剪贴板");
        }
      }

      function renderResults() {
        let filtered = enterprises.filter((r) => evaluateGroup(filterRoot, r));
        const sort = document.getElementById("resultSort").value;
        if (sort === "establishedAt") {
          filtered = filtered.sort((a, b) => String(b.establishedAt || "").localeCompare(String(a.establishedAt || "")));
        } else if (sort === "registeredCapital") {
          filtered = filtered.sort((a, b) => capitalValue(b.registeredCapital) - capitalValue(a.registeredCapital));
        } else if (sort === "grade") {
          const gradeOrder = { A: 4, B: 3, C: 2, D: 1 };
          filtered = filtered.sort((a, b) => (gradeOrder[b.grade] || 0) - (gradeOrder[a.grade] || 0));
        }

        document.getElementById("resultCount").textContent = String(filtered.length);
        const wrap = document.getElementById("resultList");
        if (!filtered.length) {
          wrap.innerHTML = `<div class="text-center py-10 text-muted text-[14px]">未找到符合条件的企业</div>`;
          return;
        }

        wrap.innerHTML = filtered
          .map((r) => {
            const contactCount = (r.contacts || []).length;
            const logoText = escapeHtml(initials(r.name));
            const contactBadge = contactCount > 0
              ? `<span class="chip chip--primary">${contactCount}个联系方式</span>`
              : `<span class="chip">0个联系方式</span>`;
            return `
              <div class="enterprise-card bg-surface rounded-xl border border-[rgba(201,205,212,.6)] p-4 cursor-pointer" data-enterprise-id="${escapeHtml(r.id)}">
                <div class="flex gap-4">
                  <div class="shrink-0 w-14 h-14 rounded-xl bg-[rgba(255,138,0,.12)] text-primary flex items-center justify-center text-[16px] font-bold">
                    ${logoText}
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="text-[16px] font-semibold truncate">${escapeHtml(r.name)}</div>
                        <div class="mt-1.5 flex flex-wrap items-center gap-2">
                          ${contactBadge}
                          <span class="${statusChipClass(r.enterpriseStatus)}">${escapeHtml(r.enterpriseStatus || "—")}</span>
                          <span class="chip chip--warning">${escapeHtml(r.enterpriseType || "—")}</span>
                        </div>
                      </div>
                      <button class="shrink-0 h-8 px-3 rounded-lg border border-[rgba(201,205,212,.7)] bg-surface text-[13px] font-semibold hover:border-primary hover:text-primary">查看详情</button>
                    </div>
                    <div class="mt-3 grid grid-cols-12 gap-y-2 gap-x-4 text-[13px]">
                      <div class="col-span-12 md:col-span-6 lg:col-span-3"><span class="text-muted">企业法人：</span><span class="font-medium">${escapeHtml(r.legalPerson || "—")}</span></div>
                      <div class="col-span-12 md:col-span-6 lg:col-span-3"><span class="text-muted">成立日期：</span><span class="font-medium">${escapeHtml(r.establishedAt || "—")}</span></div>
                      <div class="col-span-12 md:col-span-6 lg:col-span-3"><span class="text-muted">注册资本：</span><span class="font-medium">${escapeHtml(r.registeredCapital || "—")}</span></div>
                      <div class="col-span-12 md:col-span-6 lg:col-span-3"><span class="text-muted">客户等级：</span><span class="font-medium">${escapeHtml(r.grade || "—")}</span></div>
                      <div class="col-span-12 md:col-span-6 lg:col-span-3"><span class="text-muted">企业规模：</span><span class="font-medium">${escapeHtml(r.enterpriseScale || "—")}</span></div>
                      <div class="col-span-12 md:col-span-6 lg:col-span-3"><span class="text-muted">行业类型：</span><span class="font-medium">${escapeHtml(r.industry || "—")}</span></div>
                      <div class="col-span-12 md:col-span-12 lg:col-span-6"><span class="text-muted">注册地址：</span><span class="font-medium">${escapeHtml(r.registeredAddress || "—")}</span></div>
                    </div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");

        wrap.querySelectorAll("[data-enterprise-id]").forEach((card) => {
          card.addEventListener("click", () => {
            const id = card.getAttribute("data-enterprise-id");
            const row = enterprises.find((x) => x.id === id);
            if (row) LeadDetailModal.open(row);
          });
        });
      }

      document.getElementById("btnSearch").addEventListener("click", renderResults);
      document.getElementById("resultSort").addEventListener("change", renderResults);
      document.getElementById("btnReset").addEventListener("click", () => {
        filterRoot = {
          op: "all",
          items: [{ type: "condition", field: "", operator: "包含", value: "", value2: "", tags: [] }],
        };
        renderBuilder();
        renderResults();
      });

      // modal close bindings
      document.querySelectorAll('[data-close="field-pool"]').forEach((btn) => {
        btn.addEventListener("click", () => closeModal("field-pool"));
      });
      document.querySelector('[data-overlay="field-pool"]').addEventListener("click", () => closeModal("field-pool"));
      const fieldPoolSearch = document.getElementById("fieldPoolSearch");
      const fieldPoolSearchBtn = document.getElementById("fieldPoolSearchBtn");
      const fieldPoolResetBtn = document.getElementById("fieldPoolResetBtn");
      function doFieldPoolSearch() {
        renderFieldPool();
      }
      if (fieldPoolSearch) {
        fieldPoolSearch.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doFieldPoolSearch();
        });
      }
      if (fieldPoolSearchBtn) fieldPoolSearchBtn.addEventListener("click", doFieldPoolSearch);
      if (fieldPoolResetBtn) {
        fieldPoolResetBtn.addEventListener("click", () => {
          fieldPoolSearch.value = "";
          renderFieldPool();
        });
      }

      renderBuilder();
      renderResults();
    </script>
  </body>
</html>
